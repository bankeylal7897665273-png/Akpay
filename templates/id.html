<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Deposit Payment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold;}
        body { background-color: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;}
        .checkout-box { background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .timer-box { font-size: 36px; color: #ef4444; margin: 10px 0; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .amount-display { font-size: 32px; color: #10b981; margin-bottom: 20px; }
        .qr-container { background: #fff; padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 20px; }
        .qr-container img { width: 200px; height: 200px; }
        
        .app-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .app-btn { width: 50px; height: 50px; border-radius: 12px; background: #1e293b; display: flex; justify-content: center; align-items: center; font-size: 24px; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); }
        .app-btn.gpay { color: #4285F4; }
        .app-btn.phonepe { color: #5f259f; }
        .app-btn.paytm { color: #00b9f5; }
        
        input { width: 100%; padding: 16px; background: #1e293b; border: 2px solid #334155; color: #fff; border-radius: 15px; margin-bottom: 15px; outline: none; font-size: 16px; text-align: center; letter-spacing: 2px;}
        input:focus { border-color: #3b82f6; }
        button { width: 100%; padding: 16px; background: #3b82f6; color: #fff; border: none; border-radius: 15px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; }

        #message { margin-top: 15px; display: none; padding: 10px; border-radius: 10px; font-size: 15px; }
    </style>
</head>
<body>

    <div class="checkout-box" id="main-box">
        <h2 style="color: #cbd5e1; font-size: 16px;">COMPLETE PAYMENT</h2>
        
        <div class="timer-box" id="timer">05:00</div>
        
        <div class="amount-display">₹{{ amount }}</div>
        
        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa={{upi_id}}&pn=Merchant&am={{amount}}&cu=INR" alt="QR">
        </div>
        
        <div class="app-buttons">
            <a href="upi://pay?pa={{upi_id}}&pn=Merchant&am={{amount}}&cu=INR" class="app-btn gpay"><i class="fab fa-google"></i></a>
            <a href="phonepe://pay?pa={{upi_id}}&pn=Merchant&am={{amount}}&cu=INR" class="app-btn phonepe"><i class="fas fa-rupee-sign"></i></a>
            <a href="paytmmp://pay?pa={{upi_id}}&pn=Merchant&am={{amount}}&cu=INR" class="app-btn paytm"><i class="fas fa-wallet"></i></a>
        </div>
        
        <input type="text" id="utr-input" placeholder="ENTER 12-DIGIT UTR" maxlength="12">
        <button onclick="submitUTR()" id="verify-btn">Verify UTR</button>
        
        <div id="message"></div>
    </div>

    <div class="checkout-box" id="expired-box" style="display: none;">
        <i class="fas fa-times-circle" style="font-size: 60px; color: #ef4444; margin-bottom: 20px;"></i>
        <h2 style="color: #ef4444;">ID Expired</h2>
        <p style="color: #94a3b8; margin-top: 10px;">Time is up. Please generate a new link.</p>
    </div>

    <script>
        const API_USERNAME = "{{ username }}";
        const AMOUNT = "{{ amount }}";
        
        // Timer Logic (5 Minutes)
        let timeLeft = 300; 
        
        function updateTimer() {
            if(timeLeft <= 0) {
                document.getElementById('main-box').style.display = 'none';
                document.getElementById('expired-box').style.display = 'block';
                return;
            }
            timeLeft--;
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }
        setInterval(updateTimer, 1000);

        // Verify UTR
        async function submitUTR() {
            const utr = document.getElementById('utr-input').value;
            const msgBox = document.getElementById('message');
            const btn = document.getElementById('verify-btn');
            
            if(utr.length < 12) {
                msgBox.innerText = "Please enter 12-digit UTR";
                msgBox.style.background = "rgba(239, 68, 68, 0.2)";
                msgBox.style.color = "#ef4444";
                msgBox.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Checking Email...";
            msgBox.style.display = "none";

            try {
                // Seedha backend Auto Deposit API ko hit karega
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: API_USERNAME, utr: utr, amount: AMOUNT })
                });

                const result = await response.json();
                msgBox.innerText = result.message;
                
                if(response.ok) {
                    msgBox.style.background = "rgba(16, 185, 129, 0.2)";
                    msgBox.style.color = "#10b981";
                    document.getElementById('utr-input').disabled = true;
                    btn.innerText = "Payment Successful ✅";
                    timeLeft = 99999; // Stop expiry
                } else {
                    msgBox.style.background = "rgba(239, 68, 68, 0.2)";
                    msgBox.style.color = "#ef4444";
                    btn.disabled = false;
                    btn.innerText = "Verify UTR";
                }
                msgBox.style.display = "block";

            } catch (error) {
                msgBox.innerText = "Server error. Try again.";
                msgBox.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Verify UTR";
            }
        }
    </script>
</body>
</html>
