<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Checkout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;}
        
        .checkout-box { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .timer-box { font-size: 32px; font-weight: bold; color: #ef4444; margin: 15px 0; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        
        .qr-container { background: #fff; padding: 15px; border-radius: 15px; display: inline-block; margin: 20px 0; }
        .qr-container img { width: 200px; height: 200px; }
        
        .amount-display { font-size: 28px; font-weight: bold; color: #10b981; margin-bottom: 20px; }
        
        .app-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .app-btn { width: 50px; height: 50px; border-radius: 12px; background: #1e293b; display: flex; justify-content: center; align-items: center; font-size: 24px; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .app-btn:hover { background: #334155; transform: translateY(-3px); }
        .app-btn.gpay { color: #4285F4; }
        .app-btn.phonepe { color: #5f259f; }
        .app-btn.paytm { color: #00b9f5; }
        
        input { width: 100%; padding: 16px; background: #1e293b; border: 2px solid #334155; color: #fff; border-radius: 15px; margin-bottom: 15px; outline: none; font-size: 16px; font-weight: bold; text-align: center; letter-spacing: 2px;}
        input:focus { border-color: #3b82f6; }
        
        button { width: 100%; padding: 16px; background: #3b82f6; color: #fff; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        button:disabled { background: #475569; cursor: not-allowed; }

        #message { margin-top: 15px; font-weight: bold; display: none; padding: 10px; border-radius: 10px; }
        .success-msg { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .error-msg { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>

    <div class="checkout-box" id="main-box">
        <h2 style="color: #cbd5e1; font-size: 18px; text-transform: uppercase;">Complete Payment</h2>
        
        <div class="timer-box" id="timer">05:00</div>
        
        <div class="amount-display">₹{{ amount }}</div>
        <p style="font-size: 14px; color: #94a3b8;">Scan QR or use apps below to pay</p>
        
        <div class="qr-container">
            <img id="qrcode" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa={{upi_id}}&pn=Merchant&am={{amount}}&cu=INR" alt="QR Code">
        </div>
        
        <div class="app-buttons">
            <a href="upi://pay?pa={{upi_id}}&pn=Merchant&am={{amount}}&cu=INR" class="app-btn gpay"><i class="fab fa-google"></i></a>
            <a href="phonepe://pay?pa={{upi_id}}&pn=Merchant&am={{amount}}&cu=INR" class="app-btn phonepe"><i class="fas fa-rupee-sign"></i></a>
            <a href="paytmmp://pay?pa={{upi_id}}&pn=Merchant&am={{amount}}&cu=INR" class="app-btn paytm"><i class="fas fa-wallet"></i></a>
        </div>
        
        <input type="text" id="utr-input" placeholder="ENTER 12-DIGIT UTR" maxlength="12">
        <button onclick="submitUTR()" id="verify-btn">Verify Payment</button>
        
        <div id="message"></div>
    </div>

    <div class="checkout-box" id="expired-box" style="display: none;">
        <i class="fas fa-times-circle" style="font-size: 60px; color: #ef4444; margin-bottom: 20px;"></i>
        <h2 style="color: #ef4444;">Session Expired</h2>
        <p style="color: #94a3b8; margin-top: 10px;">This payment link is no longer valid. Please go back and generate a new request.</p>
    </div>

    <script>
        // Data injected by Flask
        const expiresAt = {{ expires_at }};
        const apiId = "{{ api_id }}";
        const txnId = "{{ txn_id }}";
        let isExpired = false;

        function updateTimer() {
            if(isExpired) return;
            const now = Math.floor(Date.now() / 1000);
            const diff = expiresAt - now;

            if (diff <= 0) {
                isExpired = true;
                document.getElementById('main-box').style.display = 'none';
                document.getElementById('expired-box').style.display = 'block';
                return;
            }

            const m = Math.floor(diff / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        async function submitUTR() {
            const utr = document.getElementById('utr-input').value;
            const msgBox = document.getElementById('message');
            const btn = document.getElementById('verify-btn');
            
            if(utr.length < 12) {
                msgBox.innerText = "Please enter valid 12-digit UTR";
                msgBox.className = "error-msg";
                msgBox.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Verifying...";
            msgBox.style.display = "none";

            try {
                const response = await fetch('/api/verify_utr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ txn_id: txnId, utr: utr, api_id: apiId })
                });

                const result = await response.json();
                
                msgBox.innerText = result.message;
                if(response.ok) {
                    msgBox.className = "success-msg";
                    // Lock everything on success
                    document.getElementById('utr-input').disabled = true;
                    btn.innerText = "Verified ✅";
                    clearInterval(); // Stop timer
                } else {
                    msgBox.className = "error-msg";
                    btn.disabled = false;
                    btn.innerText = "Verify Payment";
                }
                msgBox.style.display = "block";

            } catch (error) {
                msgBox.innerText = "Server Error. Try again.";
                msgBox.className = "error-msg";
                msgBox.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Verify Payment";
            }
        }
    </script>
</body>
</html>
